<div class="form-page-container">
  <div id="form">

    <form id="uploadForm">
      <label for="title">TITRE DU MOD</label>
      <input type="text" id="title" placeholder="Ex: Scania G8 Collection" name="title" maxlength="31" required>

      <label for="cat">CATÉGORIE</label>
      <select id="cat" name="cat" required>
        <option value="vehicules">Véhicules</option>
        <option value="peintures">Peintures</option>
        <option value="cartes">Cartes</option>
        <option value="divers">Divers</option>
      </select><br>

      <label for="desc">DESCRIPTION</label>
      <textarea id="desc" name="desc" rows="4" placeholder="Décrivez votre mod en détail..." required></textarea>

      <label for="images">IMAGES DU MOD (URL)</label>
      <input id="images" placeholder="Ex: https://lien.com/image.jpg" type="text" name="images" required>
      <div class="password-hint">Séparez plusieurs liens par des virgules s'il y a plusieurs images.</div>

      <label for="link">LIEN DE TÉLÉCHARGEMENT</label>
      <input id="link" placeholder="Ex: https://sharemods.com/..." type="url" name="link" required>

      <div class="form-button-card">
        <button id="submit-button" class="submit-button" type="submit"> Soumettre </button>
        <button class="reset-button" type="reset">Réinitialiser</button>
      </div>
      <p id="output" style="margin-top: 15px; font-weight: bold;"></p>
    </form>
    <div class="main-droite"><!--boule stoper par un c avant la class-->

        <div class="ball"></div>
